name: InfraScan Report Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-report-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local InfraScan Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: infrascan:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Scan on Repository
        run: |
          mkdir -p artifacts
          chmod 777 artifacts
          docker run --rm \
            -v ${{ github.workspace }}:/scan \
            infrascan:test \
            /scan \
            --format html \
            --out /scan/artifacts/infrascan-report.html

      - name: Upload HTML Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: infrascan-report-test
          path: artifacts/infrascan-report.html
          retention-days: 7
