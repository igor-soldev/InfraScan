version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: infra-scan-backend
    restart: always
    command: web
    environment:
      - FLASK_ENV=production
      - DOCKER_HUB_USERNAME=${DOCKER_HUB_USERNAME}
      - DOCKER_HUB_PASSWORD=${DOCKER_HUB_PASSWORD}
    volumes:
      - ./static:/opt/infrascan/static
      - ./feedback:/opt/infrascan/feedback
      - ./scan_results:/opt/infrascan/scan_results
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for Docker Scout scanning
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: infra-scan-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/opt/infrascan/static:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: infra-scan-certbot
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
